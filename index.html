<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Verificador de Senha</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h3>Senha</h3>
        <p class="instrucao">A senha deve conter mais de 7 caracteres e ser suficientemente forte.</p>
        
        <div class="input-wrapper">
            <input type="password" id="passInput" placeholder="Digite sua senha">
            <span id="char-count">0</span>
        </div>
        
        <!-- Os 4 tracinhos separados -->
        <div class="strength-segments">
            <div class="segment" id="seg-1"></div>
            <div class="segment" id="seg-2"></div>
            <div class="segment" id="seg-3"></div>
            <div class="segment" id="seg-4"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
